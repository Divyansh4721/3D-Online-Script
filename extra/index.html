<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Drive Video Player</title>
</head>

<body>

    <h2 style="text-align:center;">My Video Player</h2>

    <!-- Alternate direct stream link -->
    <video controls width="800" preload="metadata">
        <!-- Notice the added "&confirm=t" parameter near the end -->
        <source
            src="https://drive.usercontent.google.com/download?export=download&confirm=t&id=1seHJtFGloL0Bn1cbMABXRPaSoSOwbtfI"
            type="video/mp4">
        Your browser does not support the video tag.
    </video>
</body>

</html>
