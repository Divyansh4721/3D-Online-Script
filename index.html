<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MovieBox Premium — Private Collection</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        body {
            font-family: "Inter", sans-serif;
            background-color: #050505;
        }

        .luxury-heading {
            font-family: "Cormorant Garamond", serif;
        }
    </style>
</head>

<body
    class="text-zinc-200 min-h-screen selection:bg-amber-500/30 selection:text-amber-200 flex flex-col justify-between overflow-x-hidden">
    <div>
        <header
            class="border-b border-zinc-900 bg-[#0d0d0d]/80 backdrop-blur-xl sticky top-0 z-50 px-4 sm:px-6 lg:px-8">
            <div
                class="max-w-7xl mx-auto py-5 sm:py-6 flex flex-col sm:flex-row items-center justify-between gap-4 sm:gap-6">
                <div class="flex items-center gap-4 text-center sm:text-left">
                    <div
                        class="h-12 w-12 rounded-xl bg-gradient-to-br from-amber-300 via-amber-500 to-amber-700 flex items-center justify-center font-bold text-black text-xl shadow-2xl shadow-amber-500/10 tracking-tighter luxury-heading">
                        MB
                    </div>
                    <div>
                        <h1
                            class="luxury-heading text-2xl font-medium tracking-widest bg-gradient-to-b from-zinc-100 to-zinc-400 bg-clip-text text-transparent uppercase">
                            MovieBox
                        </h1>
                        <p class="text-[10px] tracking-[0.3em] text-amber-500/60 uppercase font-semibold">
                            Curated by Divyansh
                        </p>
                    </div>
                </div>
                <div class="flex items-center gap-3 w-full sm:w-auto">
                    <div class="relative w-full sm:w-80 group">
                        <div
                            class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-zinc-500 group-focus-within:text-amber-400 transition-colors">
                            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                            </svg>
                        </div>
                        <input type="text" id="searchInput" placeholder="Search the private collection..."
                            class="w-full bg-[#121212] text-zinc-200 pl-11 pr-4 py-3 rounded-xl border border-zinc-800/60 focus:outline-none focus:border-amber-500/40 focus:ring-1 focus:ring-amber-500/10 transition-all placeholder-zinc-600 text-sm tracking-wide" />
                    </div>
                </div>
            </div>
        </header>
        <main class="max-w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-12">
            <div class="max-w-7xl mx-auto mb-8 flex items-center justify-between border-b border-zinc-900 pb-4">
                <span class="text-[10px] uppercase tracking-[0.2em] text-zinc-500 font-semibold" id="resultsCount">
                    Analyzing Repository Vault...
                </span>
            </div>
            <div id="moviesGrid"
                class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-6 max-w-7xl mx-auto">
            </div>
            <div id="noResults" class="hidden text-center py-24">
                <svg class="mx-auto h-10 w-10 text-zinc-800 mb-4 font-light" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1"
                        d="M7 4v16M17 4v16M3 8h18M3 16h18" />
                </svg>
                <h3 class="luxury-heading text-xl font-medium text-zinc-500 tracking-wider">
                    No Archives Found
                </h3>
                <p class="text-xs text-zinc-600 mt-1 tracking-wide">
                    Refine your inquiry text parameters.
                </p>
            </div>
        </main>
    </div>
    <footer class="border-t border-zinc-900/60 py-10 mt-12 text-center bg-[#0a0a0a] w-full">
        <p class="luxury-heading text-sm tracking-[0.4em] text-amber-500/40 uppercase font-medium">
            MovieBox Premium &bull; Private Archive
        </p>
        <p class="text-[9px] uppercase tracking-[0.2em] text-zinc-600 mt-2 font-mono">
            Engineered by Divyansh
        </p>
    </footer>
    <script>
        const moviesGrid = document.getElementById("moviesGrid");
        const searchInput = document.getElementById("searchInput");
        const noResults = document.getElementById("noResults");
        const resultsCount = document.getElementById("resultsCount");
        let moviesData = [];
        function formatDuration(isoDuration) {
            if (!isoDuration || typeof isoDuration !== "string") return "N/A";
            const hours = isoDuration.match(/(\d+)H/);
            const minutes = isoDuration.match(/(\d+)M/);
            const seconds = isoDuration.match(/(\d+)S/);
            const parts = [];
            if (hours) parts.push(`${hours[1]}h`);
            if (minutes) parts.push(`${minutes[1]}m`);
            if (seconds) parts.push(`${seconds[1]}s`);
            return parts.length > 0 ? parts.join(" ") : isoDuration;
        }
        function triggerSearchFilter() {
            const query = searchInput.value.toLowerCase().trim();
            const filtered = moviesData.filter((movie) => {
                const targetText = movie.art_content_text
                    ? movie.art_content_text.toLowerCase()
                    : "";
                return targetText.includes(query);
            });
            filtered.sort((a, b) => {
                const nameA = a.metadata?.name || "";
                const nameB = b.metadata?.name || "";
                return nameA.localeCompare(nameB);
            });
            renderMovies(filtered);
        }
        function renderMovies(movies) {
            moviesGrid.innerHTML = "";
            resultsCount.textContent = `Vault Index: ${movies.length} of ${moviesData.length} Pieces Available`;
            if (movies.length === 0) {
                moviesGrid.classList.add("hidden");
                noResults.classList.remove("hidden");
                return;
            }
            moviesGrid.classList.remove("hidden");
            noResults.classList.add("hidden");
            movies.forEach((movie) => {
                const meta = movie.metadata || {};
                const name = meta.name || "Untitled Production";
                const thumbnailUrl = meta.thumbnailUrl || "";
                const duration = meta.duration || "";
                const displayDescription = meta.description || "";
                const card = document.createElement("a");
                card.href = `player.html?title=${encodeURIComponent(name)}`;
                card.className =
                    "relative bg-[#0d0d0d] border border-zinc-900 rounded-2xl overflow-hidden shadow-2xl hover:border-amber-500/30 transition-all duration-300 ease-out group flex flex-col justify-end aspect-[2/3] w-full min-w-0 cursor-pointer hover:scale-[1.02] focus:scale-[1.02] focus:outline-none focus:ring-1 focus:ring-amber-500/40";
                card.innerHTML = `
                    <div class="absolute inset-0 w-full h-full bg-[#050505] overflow-hidden">
                        <img 
                            src="${thumbnailUrl}" 
                            alt="${name}"
                            class="w-full h-full object-cover transition-transform duration-700 ease-out group-hover:scale-105"
                            onerror="this.src='https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=600&auto=format&fit=crop'"
                        >
                    </div>
                    
                    <div class="absolute top-3 right-3 z-20">
                        <div class="text-[10px] tracking-wider font-bold text-amber-400 bg-black/85 backdrop-blur-md px-2.5 py-1 rounded-md border border-zinc-800 shadow-md">
                            ${formatDuration(duration)}
                        </div>
                    </div>
                    
                    <div class="relative z-10 p-5 pt-24 bg-gradient-to-t from-black via-black/95 to-transparent opacity-95 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end gap-2.5 min-h-[60%]">
                        
                        <h2 class="luxury-heading text-xl font-medium text-zinc-100 group-hover:text-amber-300 transition-colors tracking-wide line-clamp-1 leading-tight">
                            ${name}
                        </h2>
                        
                        <p class="text-zinc-400 text-[11px] sm:text-xs leading-relaxed font-light line-clamp-3 pt-2 border-t border-zinc-900/60">
                            ${displayDescription}
                        </p>
                    </div>
                `;
                moviesGrid.appendChild(card);
            });
        }
        searchInput.addEventListener("input", triggerSearchFilter);
        async function initializeApp() {
            try {
                resultsCount.textContent = "Unlocking secured vaults...";
                const response = await fetch("main/finalData.json");
                if (!response.ok) throw new Error(`Status: ${response.status}`);
                moviesData = await response.json();
                moviesData.sort((a, b) => {
                    const nameA = a.metadata?.name || "";
                    const nameB = b.metadata?.name || "";
                    return nameA.localeCompare(nameB);
                });
                renderMovies(moviesData);
            } catch (error) {
                console.error("Data error:", error);
                resultsCount.textContent = "❌ Vault System Failure";
                moviesGrid.innerHTML = `
                    <div class="col-span-full text-center py-12 text-red-400 bg-red-950/10 border border-red-900/30 rounded-2xl text-sm font-light">
                        Unable to securely sync repository indexes. Ensure <strong>finalData.json</strong> is placed locally.
                    </div>`;
            }
        }
        initializeApp();
    </script>
</body>

</html>
